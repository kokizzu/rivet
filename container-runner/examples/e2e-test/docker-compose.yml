# Local end-to-end: self-hosted Rivet engine + the game container (container-runner
# wrapping the Node test server). All x86_64/amd64 to mirror Cloud Run.
#
# Flow:
#   create actor (POST /actors) -> engine POSTs /api/rivet/start to game:8080
#     -> container-runner spawns the Node child -> reports Running
#   client ws -> engine guard (6420) /gateway/<actor_id>/ -> tunnel -> container-runner
#     -> proxied to child 127.0.0.1:7770
#
# Concurrency=1 caveat: one actor per game-container lifetime. To test another actor,
# restart the `game` service (docker compose restart game).

services:
  rivet-engine:
    # Override with a version-pinned tag if the local checkout's protocol has drifted
    # from the latest published engine image.
    image: ${RIVET_ENGINE_IMAGE:-rivetdev/engine:latest}
    restart: unless-stopped
    environment:
      - RIVET__FILE_SYSTEM__PATH=/var/lib/rivet-engine
    volumes:
      - ./rivet-engine/config.jsonc:/etc/rivet/config.jsonc:ro
      - rivet-engine-data:/var/lib/rivet-engine
    ports:
      - "6420:6420" # guard / public API (client + control plane)
      - "6421:6421" # api-peer / health
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:6421/health"]
      interval: 2s
      timeout: 10s
      retries: 20
      start_period: 20s

  game:
    image: game:latest
    build:
      # The build context is the rivet repo root so the image can build the crate
      # against its in-repo workspace dependencies.
      context: ../../..
      dockerfile: container-runner/examples/test-server/Dockerfile
    restart: unless-stopped
    environment:
      - PORT=8080
      - CHILD_PORT=7770
      - RIVET_ACTOR_NAME=game
      - RUST_LOG=info
    depends_on:
      rivet-engine:
        condition: service_healthy
    # The engine reaches the front door at game:8080 on the compose network; all client
    # traffic tunnels through the engine's guard (6420). See README "macOS limitation".

volumes:
  rivet-engine-data:
